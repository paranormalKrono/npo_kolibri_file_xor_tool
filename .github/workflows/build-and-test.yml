name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-qt6-base
          mingw-w64-x86_64-qt6-tools
          mingw-w64-x86_64-just
          mingw-w64-x86_64-nsis
    
    - name: Verify environment
      shell: msys2 {0}
      run: |
        echo "=== Environment Check ==="
        echo "MSYSTEM: $MSYSTEM"
        echo "Current directory: $(pwd)"
        cmake --version
        qmake6 --version || echo "qmake6 not found"
        just --version || echo "just not found"
        echo "========================="
    
    - name: Configure CMake (Debug)
      shell: msys2 {0}
      run: |
        echo ">>> Configuring CMake..."
        cmake -B build/debug -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Debug
        echo ">>> CMake configuration complete"
    
    - name: Build all targets
      shell: msys2 {0}
      run: |
        echo ">>> Building project..."
        cmake --build build/debug --parallel
        echo ">>> Build complete"
    
    - name: Run unit tests
      shell: msys2 {0}
      run: |
        echo ">>> Running unit tests..."
        cd build/debug
        ctest --output-on-failure -R "test_hex_parser|test_file_utils|test_file_cache|test_operations" -V
        echo ">>> Unit tests complete"
    
    - name: Run integration tests (Worker)
      shell: msys2 {0}
      run: |
        echo ">>> Running Worker tests..."
        cd build/debug
        ctest --output-on-failure -R test_worker -V
        echo ">>> Worker tests complete"
    
    - name: Run stress tests
      shell: msys2 {0}
      run: |
        echo ">>> Running stress tests..."
        cd build/debug
        ctest --output-on-failure -R test_stress -V
        echo ">>> Stress tests complete"
    
    - name: Run GUI tests
      shell: msys2 {0}
      run: |
        echo ">>> Running GUI tests..."
        cd build/debug
        ctest --output-on-failure -R test_mainwindow -V
        echo ">>> GUI tests complete"
      continue-on-error: true
    
    - name: Build Release
      shell: msys2 {0}
      run: |
        echo ">>> Building Release..."
        cmake -B build/release -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
        cmake --build build/release --parallel
        echo ">>> Release build complete"
    
    - name: Create package
      shell: msys2 {0}
      run: |
        echo ">>> Creating package..."
        cd build/release
        cpack -G ZIP
        echo ">>> Package created"
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: FileXorTool-Windows
        path: build/release/_CPack_Packages/**/*.zip
        if-no-files-found: warn
        retention-days: 30
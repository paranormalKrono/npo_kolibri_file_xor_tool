name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest
    
    defaults:
      run:
        shell: msys2 {0}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-toolchain
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-qt6-base
          mingw-w64-x86_64-qt6-tools
          mingw-w64-x86_64-just
          mingw-w64-x86_64-nsis
    
    - name: Cache CMake build
      uses: actions/cache@v4
      with:
        path: build
        key: ${{ runner.os }}-cmake-${{ hashFiles('**/CMakeLists.txt') }}
        restore-keys: |
          ${{ runner.os }}-cmake-
    
    - name: Configure CMake (Debug)
      run: cmake -B build/debug -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Debug
    
    - name: Build all targets
      run: cmake --build build/debug --parallel
    
    - name: Run unit tests (HexParser, FileUtils, FileCache, Operations)
      run: |
        cd build/debug
        ctest --output-on-failure -R "test_hex_parser|test_file_utils|test_file_cache|test_operations" -V
    
    - name: Run integration tests (Worker)
      run: |
        cd build/debug
        ctest --output-on-failure -R test_worker -V
    
    - name: Run stress tests
      run: |
        cd build/debug
        ctest --output-on-failure -R test_stress -V
    
    - name: Run GUI tests
      run: |
        cd build/debug
        ctest --output-on-failure -R test_mainwindow -V
      continue-on-error: true  # GUI-тесты могут падать на headless CI
    
    - name: Build Release
      run: |
        cmake -B build/release -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
        cmake --build build/release --parallel
    
    - name: Create package
      run: |
        cd build/release
        cpack -G ZIP
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: FileXorTool-Windows
        path: build/release/_CPack_Packages/**/*.zip
        if-no-files-found: warn
        retention-days: 30